<!-- @startingPoint section="App" subtitle="推し活マネージャー カレンダー画面（ホーム）スマホモック" viewport="430x880" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>推し活マネージャー — カレンダー画面</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --oshi-pink:#ff5fa2; --oshi-pink-deep:#d61f69; --purple:#8b5cf6; --purple-deep:#6d28d9;
  --gold:#f59e0b; --gold-ink:#b45309; --mint:#34d399; --mint-ink:#0f9d6b;
  --cream:#fff7fb; --white:#ffffff; --ink:#2b1b26; --ink-muted:#7a6b74; --line:#f3e3ec;
  --pink-soft:#ffe6f1; --purple-soft:#ede4ff; --gold-soft:#fdeccc; --mint-soft:#d6f7ec;
  --grad-primary:linear-gradient(120deg,#ff5fa2 0%,#b06bf0 55%,#8b5cf6 100%);
  --font-body:"Zen Maru Gothic",system-ui,-apple-system,sans-serif;
  --font-display:"Kaisei Decol","Zen Maru Gothic",serif;
  --r-sm:8px; --r-md:14px; --r-lg:22px; --r-pill:99px;
  --sh-card:0 8px 22px rgba(214,31,105,.07);
  --sh-pop:0 14px 40px rgba(214,31,105,.16);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:8px;
  background:transparent;
  font-family:var(--font-body);-webkit-font-smoothing:antialiased}

/* ---- phone shell ---- */
.phone{width:390px;max-width:100%;background:#1f1430;border-radius:46px;padding:11px;
  box-shadow:0 36px 80px rgba(31,20,48,.42);position:relative}
.notch{position:absolute;top:21px;left:50%;transform:translateX(-50%);width:120px;height:30px;
  background:#1f1430;border-radius:99px;z-index:6}
.screen{position:relative;background:#f5f0fb;border-radius:36px;overflow:hidden;height:812px;
  display:flex;flex-direction:column}

/* ---- status bar ---- */
.status{display:flex;justify-content:space-between;align-items:center;padding:12px 26px 6px;
  color:#fff;font-weight:700;font-size:13px;position:relative;z-index:4}
.status .r{display:flex;gap:6px;align-items:center;font-size:11px;letter-spacing:.04em}

/* ---- header ---- */
.hdr{background:var(--grad-primary);background-size:200% 200%;animation:drift 10s var(--ease) infinite alternate;
  padding:0 0 18px;position:relative;border-radius:0 0 24px 24px}
@keyframes drift{from{background-position:0% 50%}to{background-position:100% 50%}}
@media(prefers-reduced-motion:reduce){.hdr{animation:none}}
.hdr .bar{display:flex;align-items:center;justify-content:space-between;padding:2px 20px 0}
.hdr .title{display:flex;align-items:center;gap:9px;color:#fff}
.hdr .title b{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:.01em}
.dev-tag{font-size:10px;font-weight:700;color:#fff;background:rgba(255,255,255,.22);
  padding:4px 9px;border-radius:var(--r-pill);letter-spacing:.02em}
.bubble{display:flex;align-items:center;gap:10px;margin:12px 20px 0;background:rgba(255,255,255,.96);
  border-radius:var(--r-pill);padding:9px 14px 9px 10px;box-shadow:0 6px 16px rgba(31,20,48,.14)}
.bubble .say{font-weight:700;font-size:13px;color:var(--ink)}
.bubble .say small{display:block;color:var(--ink-muted);font-weight:700;font-size:10.5px;margin-top:1px}

/* ---- content scroll ---- */
.content{flex:1;overflow-y:auto;padding:14px 16px 12px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:0}

/* ---- month nav ---- */
.mnav{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 12px}
.mnav .m{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink);white-space:nowrap}
.mnav .m span{color:var(--oshi-pink-deep)}
.mnav .nav{display:flex;gap:6px;align-items:center}
.iconbtn{width:34px;height:34px;border-radius:99px;border:1px solid var(--line);background:#fff;
  display:grid;place-items:center;cursor:pointer;color:var(--oshi-pink-deep)}
.today-btn{height:34px;padding:0 14px;border-radius:99px;border:1.5px solid var(--oshi-pink);background:#fff;
  color:var(--oshi-pink-deep);font-family:var(--font-body);font-weight:900;font-size:12px;cursor:pointer}

/* ---- calendar ---- */
.cal{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-card);
  padding:12px 10px 10px}
.dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dow span{text-align:center;font-weight:700;font-size:11px;color:var(--ink-muted)}
.dow span.sun{color:var(--oshi-pink-deep)}
.dow span.sat{color:var(--purple-deep)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cell{position:relative;min-height:56px;border-radius:10px;padding:4px 3px 3px;display:flex;
  flex-direction:column;gap:2px}
.cell .d{font-weight:700;font-size:11.5px;color:var(--ink);text-align:center;line-height:1.1}
.cell.out .d{color:#d9c8d2}
.cell.past{opacity:.62}
.cell.today{background:var(--pink-soft)}
.cell.today .d{color:var(--oshi-pink-deep);font-weight:900}
.cell .d .dot{display:inline-block;width:4px;height:4px;border-radius:99px;background:var(--oshi-pink);
  vertical-align:middle;margin-left:2px}
/* pin marker (top-right corner) */
.pin{position:absolute;top:3px;right:3px;width:15px;height:15px}
/* event bars by confidence */
.ev{font-size:8.5px;font-weight:900;line-height:1.15;border-radius:5px;padding:2px 3px;
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-fixed{background:var(--oshi-pink);color:#fff}                                   /* 確定：実線ベタ塗り */
.ev-lottery{background:#fff;color:var(--gold-ink);border:1.5px dashed var(--gold)}  /* 当落待ち：点線枠 */
.ev-planned{background:#fff;color:var(--purple-deep);border:1.5px solid var(--purple)} /* 予定：細実線枠 */
.ev-wish{background:transparent;color:var(--ink-muted);border:1.5px dashed #e3cfdc;opacity:.78} /* 行ってみたい：ゴースト */
.ev-done{background:var(--line);color:var(--ink-muted)}                             /* 参加済み：淡色 */
.cd{display:flex;align-items:center;gap:2px;justify-content:center;font-size:7.5px;font-weight:900;
  color:var(--gold-ink);background:var(--gold-soft);border-radius:4px;padding:1px 2px}
.qbadge{display:inline-grid;place-items:center;width:11px;height:11px;border-radius:99px;background:var(--gold);
  color:#fff;font-size:8px;font-weight:900;margin-left:2px;vertical-align:middle}

/* ---- legend (confidence) ---- */
.section-t{font-weight:900;font-size:12px;color:var(--ink);margin:16px 4px 8px;letter-spacing:.02em}
.legend{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-card);
  padding:11px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px 12px}
.lg{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--ink)}
.chipdemo{flex:0 0 auto;width:30px;height:16px;border-radius:5px}

/* ---- deadline pins legend ---- */
.pins{display:flex;flex-wrap:wrap;gap:7px}
.pinlg{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);
  border-radius:var(--r-pill);padding:6px 11px 6px 8px;font-size:11px;font-weight:700;color:var(--ink);
  box-shadow:var(--sh-card)}

/* ---- inbox (気になる) ---- */
.inbox{background:var(--purple-soft);border:1.5px dashed #cbb8f0;border-radius:var(--r-md);padding:12px}
.inbox .ttl{display:flex;align-items:center;gap:6px;font-weight:900;font-size:11.5px;color:var(--purple-deep);
  margin-bottom:9px}
.inbox .chips{display:flex;flex-direction:column;gap:8px}
.wishchip{display:flex;align-items:center;gap:9px;background:#fff;border-radius:var(--r-md);padding:9px 11px;
  box-shadow:var(--sh-card)}
.wishchip .ico{width:30px;height:30px;flex:0 0 auto}
.wishchip .tx{flex:1;min-width:0}
.wishchip .tx b{font-weight:900;font-size:12.5px;color:var(--ink);display:block;line-height:1.3}
.wishchip .tx small{font-weight:700;font-size:10.5px;color:var(--ink-muted)}
.wishchip .plus{width:26px;height:26px;border-radius:99px;background:var(--pink-soft);color:var(--oshi-pink-deep);
  display:grid;place-items:center;font-weight:900;font-size:16px;flex:0 0 auto}
.note-dev{text-align:center;font-size:10px;font-weight:700;color:var(--ink-muted);margin:14px 0 4px}

/* ---- view segmented tabs (月/締切/タイムライン/支払い) ---- */
.segtabs{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border:1px solid var(--line);
  border-radius:var(--r-pill);padding:3px;margin:0 4px 10px;box-shadow:var(--sh-card)}
.segtab{border:none;background:transparent;border-radius:var(--r-pill);padding:9px 4px;font-family:var(--font-body);
  font-weight:800;font-size:12px;color:var(--ink-muted);cursor:pointer;white-space:nowrap}
.segtab.active{background:var(--oshi-pink);color:#fff}
/* ---- display height toggle row ---- */
.disp{display:flex;align-items:center;justify-content:space-between;margin:0 6px 10px}
.dispbtn{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--oshi-pink);
  border-radius:var(--r-pill);padding:7px 13px;font-family:var(--font-body);font-weight:900;font-size:11.5px;
  color:var(--oshi-pink-deep);cursor:pointer;box-shadow:var(--sh-card)}
.dispbtn .dot2{width:10px;height:10px;border-radius:99px;background:var(--oshi-pink)}
.disp .toggles{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:3px}
.disp .tg{width:32px;height:26px;border:none;background:transparent;border-radius:99px;display:grid;
  place-items:center;color:var(--ink-muted);cursor:pointer;font-size:14px}
.disp .tg.active{background:var(--pink-soft);color:var(--oshi-pink-deep)}
/* ---- tap hint ---- */
.cal-hint{text-align:center;font-size:11px;font-weight:700;color:var(--ink-muted);margin:14px 10px 2px;line-height:1.5}

/* ---- tab bar ---- */
.tabs{display:flex;border-top:1px solid var(--line);background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:4px 0;-webkit-tap-highlight-color:transparent}
.tab .ti{width:26px;height:26px;display:grid;place-items:center;border-radius:9px}
.tab.active .ti{background:var(--pink-soft)}
.tab span{font-weight:700;font-size:10px;color:var(--ink-muted)}
.tab.active span{color:var(--oshi-pink-deep);font-weight:900}
</style>
</head>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <!-- header -->
    <div class="hdr">
      <div class="status">
        <span>9:41</span>
        <span class="r"><span>5G</span><span>100%</span></span>
      </div>
      <div class="bar">
        <div class="title">
          <svg width="22" height="22"><use href="#kuroko"></use></svg>
          <b>推し活マネージャー</b>
        </div>
        <span class="dev-tag">開発中のイメージ</span>
      </div>
    </div>

    <!-- content -->
    <div class="content">
      <!-- 表示切替：月／締切／タイムライン／支払い（実アプリと一致・月がアクティブ） -->
      <div class="segtabs">
        <button class="segtab active">月</button>
        <button class="segtab">締切</button>
        <button class="segtab">タイムライン</button>
        <button class="segtab">支払い</button>
      </div>
      <!-- 月ビューの高さ切替（折りたたみ／開く／拡張） -->
      <div class="disp">
        <button class="dispbtn" aria-label="表示する推しをえらぶ"><span class="dot2"></span>表示対象 ▾</button>
        <div class="toggles">
          <button class="tg" aria-label="折りたたみ（一覧）">☰</button>
          <button class="tg active" aria-label="開く（1ヶ月）">▦</button>
          <button class="tg" aria-label="拡張（縦スクロール）">⇕</button>
        </div>

      <div class="mnav">
        <div class="m">2026年 <span>6月</span></div>
        <div class="nav">
          <button class="iconbtn" aria-label="前の月">‹</button>

          <button class="iconbtn" aria-label="次の月">›</button>

      </div>

      <div class="cal-hint">日付をタップすると、その日の予定がポップアップで開きます</div>

      <div class="note-dev">※ これは開発中のイメージです。実際の画面とは異なります。</div>

    <!-- tab bar（実アプリと一致：ホーム/カレンダー/イベント/お金/設定。当落はタブでなくホームのタイル/詳細） -->

      <button class="tab"><span class="ti" style="color:var(--ink-muted)"><svg width="24" height="24"><use href="#t-home"></use></svg></span><span>ホーム</span></button>
      <button class="tab active"><span class="ti" style="color:var(--oshi-pink-deep)"><svg width="24" height="24"><use href="#t-cal"></use></svg></span><span>カレンダー</span></button>

  </div>
</div>

<script>
(function(){
  "use strict";
  // June 2026: 1日 = 月曜（月曜始まりグリッドの先頭＝空白0）。今日 = 22日。
  var FIRST_DOW = 0, DAYS = 30, TODAY = 22;
  // 確度つきイベント（実アプリの月ビューと同じく、セル内に確度別ラベルで表示）
  var events = {
    6:  { label:"全力ライブ", kind:"fixed" },                        // 確定
    14: { label:"当落発表",   kind:"lottery", q:true, cd:"あと3日" },// 当落待ち＋カウントダウン
    20: { label:"配信",       kind:"planned" },                      // 予定（先着待ち）
    27: { label:"対バン",     kind:"wish" }                          // 行ってみたい
  };
  // 締切（セル右上のピン）
  var pins = { 10:"pay", 14:"lottery", 24:"hotel" };

  var grid = document.getElementById("grid");
  // 先頭の空白（前月分）
  for(var i=0;i<FIRST_DOW;i++){
    var pd = document.createElement("div");
    pd.className = "cell out";
    pd.innerHTML = '<div class="d">'+(28+i)+'</div>';
    grid.appendChild(pd);
  }
  for(var d=1; d<=DAYS; d++){
    var cell = document.createElement("div");
    var cls = "cell";
    if(d < TODAY) cls += " past";
    if(d === TODAY) cls += " today";
    cell.className = cls;

    var html = '<div class="d">'+d+(d===TODAY?' <span class="dot"></span>':'')+'</div>';

    // 締切ピン
    if(pins[d]) html += '<svg class="pin"><use href="#pin-'+pins[d]+'"></use></svg>';

    // イベントバー
    var ev = events[d];
    if(ev){
      var q = ev.q ? '<span class="qbadge">?</span>' : '';
      html += '<div class="ev ev-'+ev.kind+'">'+ev.label+q+'</div>';
      if(ev.cd) html += '<div class="cd">当落 '+ev.cd+'</div>';
    }
    cell.innerHTML = html;
    grid.appendChild(cell);
  }
  // 末尾の空白（翌月分）で7の倍数に揃える
  var total = FIRST_DOW + DAYS;
  var trail = (7 - (total % 7)) % 7;
  for(var t=1;t<=trail;t++){
    var nd = document.createElement("div");
    nd.className = "cell out";
    nd.innerHTML = '<div class="d">'+t+'</div>';
    grid.appendChild(nd);
  }
})();
</script>
</body>
</html>
