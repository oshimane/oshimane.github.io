<!-- @startingPoint section="App" subtitle="推し活マネージャー ホーム画面（ダッシュボード）スマホモック" viewport="430x880" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>推し活マネージャー — ホーム</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --oshi-pink:#ff5fa2; --oshi-pink-deep:#d61f69; --purple:#8b5cf6; --purple-deep:#6d28d9;
  --gold:#f59e0b; --gold-ink:#b45309; --mint:#34d399; --mint-ink:#0f9d6b;
  --cream:#fff7fb; --white:#ffffff; --ink:#2b1b26; --ink-muted:#7a6b74; --line:#f3e3ec;
  --pink-soft:#ffe6f1; --purple-soft:#ede4ff; --gold-soft:#fdeccc; --mint-soft:#d6f7ec;
  --grad-primary:linear-gradient(120deg,#ff5fa2 0%,#b06bf0 55%,#8b5cf6 100%);
  --font-body:"Zen Maru Gothic",system-ui,-apple-system,sans-serif;
  --font-display:"Kaisei Decol","Zen Maru Gothic",serif;
  --r-sm:8px; --r-md:14px; --r-lg:22px; --r-pill:99px;
  --sh-card:0 8px 22px rgba(214,31,105,.07);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:8px;
  background:transparent;
  font-family:var(--font-body);-webkit-font-smoothing:antialiased}

/* ---- phone shell ---- */
.phone{width:390px;max-width:100%;background:#1f1430;border-radius:46px;padding:11px;
  box-shadow:0 36px 80px rgba(31,20,48,.42);position:relative}
.notch{position:absolute;top:21px;left:50%;transform:translateX(-50%);width:120px;height:30px;
  background:#1f1430;border-radius:99px;z-index:6}
.screen{position:relative;background:#f5f0fb;border-radius:36px;overflow:hidden;height:812px;
  display:flex;flex-direction:column}

/* ---- status bar ---- */
.status{display:flex;justify-content:space-between;align-items:center;padding:12px 26px 6px;
  color:#fff;font-weight:700;font-size:13px;background:var(--grad-primary);position:relative;z-index:4}
.status .r{display:flex;gap:6px;align-items:center;font-size:11px}

/* ---- header bar ---- */
.hdr{background:var(--grad-primary);padding:0 20px 14px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{color:#fff;font-family:var(--font-display);font-weight:700;font-size:19px}
.hdr-right{display:flex;align-items:center;gap:10px}
.oshi-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.22);
  border-radius:var(--r-pill);padding:5px 10px;color:#fff;font-weight:900;font-size:11px}
.dev-tag{font-size:10px;font-weight:700;color:#fff;background:rgba(255,255,255,.22);
  padding:4px 9px;border-radius:var(--r-pill)}

/* ---- content scroll ---- */
.content{flex:1;overflow-y:auto;padding:12px 14px 14px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:10px}
.content::-webkit-scrollbar{width:0}

/* ---- countdown hero ---- */
.countdown{background:#2b1b26;border-radius:var(--r-lg);padding:14px 16px;color:#fff;position:relative;overflow:hidden}
.countdown::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(139,92,246,.3),rgba(214,31,105,.2));pointer-events:none}
.countdown .dot-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.countdown .dot{width:8px;height:8px;border-radius:99px;background:var(--oshi-pink)}
.countdown .sub{font-weight:700;font-size:12px;color:rgba(255,255,255,.72)}
.countdown .big{font-family:var(--font-display);font-weight:700;font-size:36px;line-height:1.05;
  color:#ffffff;letter-spacing:-.01em;margin:2px 0 6px}
.countdown .big small{font-size:16px;font-weight:900;color:rgba(255,255,255,.72);margin-right:4px}
.countdown .info{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.80)}
.countdown .info .pin{width:8px;height:8px;border-radius:99px;background:var(--mint);flex:0 0 auto}

/* ---- quick stats 3-up ---- */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:10px 8px;text-align:center;
  box-shadow:var(--sh-card)}
.stat .ico{width:28px;height:28px;border-radius:9px;margin:0 auto 6px;display:grid;place-items:center}
.stat .num{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--ink);line-height:1}
.stat .lbl{font-weight:700;font-size:10px;color:var(--ink-muted);margin-top:3px;line-height:1.3}

/* ---- balance card ---- */
.balance{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 15px;
  box-shadow:var(--sh-card)}
.balance .lab{font-weight:700;font-size:11.5px;color:var(--ink-muted)}
.balance .amt{font-family:var(--font-display);font-weight:700;font-size:32px;color:var(--oshi-pink-deep);
  line-height:1.1;margin:3px 0 8px;font-feature-settings:"tnum" 1}
.balance .gauge{position:relative;height:10px;border-radius:var(--r-pill);
  background:linear-gradient(90deg,#34d399 0%,#f59e0b 60%,#ff5fa2 100%);overflow:hidden}
.balance .gauge>span{position:absolute;top:0;right:0;height:100%;background:var(--pink-soft)}
.balance .hint{font-weight:700;font-size:11px;color:var(--ink-muted);margin-top:6px}

/* ---- nav grid 2x2 ---- */
.navgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.navtile{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:12px 13px;
  box-shadow:var(--sh-card);display:flex;flex-direction:column;gap:6px;min-height:72px;cursor:pointer}
.navtile.accent{background:var(--oshi-pink);border-color:var(--oshi-pink)}
.navtile .tile-ico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center}
.navtile .tile-ttl{font-weight:900;font-size:13px;color:var(--ink);line-height:1.2}
.navtile.accent .tile-ttl{color:#fff}
.navtile .tile-sub{font-weight:700;font-size:10.5px;color:var(--ink-muted);line-height:1.3}
.navtile.accent .tile-sub{color:rgba(255,255,255,.82)}
.navtile .tile-add{font-weight:900;font-size:14px;color:#fff}
.plus-row{display:flex;align-items:center;gap:6px}
.plus-circle{width:22px;height:22px;border-radius:99px;background:rgba(255,255,255,.28);
  display:grid;place-items:center;font-weight:900;font-size:14px;color:#fff;flex:0 0 auto}

.note-dev{text-align:center;font-size:10px;font-weight:700;color:var(--ink-muted);margin:2px 0 2px}

/* ---- tab bar ---- */
.tabs{display:flex;border-top:1px solid var(--line);background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:4px 0;-webkit-tap-highlight-color:transparent}
.tab .ti{width:26px;height:26px;display:grid;place-items:center;border-radius:9px}
.tab.active .ti{background:var(--pink-soft)}
.tab span{font-weight:700;font-size:10px;color:var(--ink-muted)}
.tab.active span{color:var(--oshi-pink-deep);font-weight:900}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- tab icons -->
  <symbol id="t-cal" viewBox="0 0 24 24"><rect x="4" y="5.5" width="16" height="15" rx="3.5" fill="none" stroke="currentColor" stroke-width="2"></rect><path d="M4 10h16M8 3.5v4M16 3.5v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path><circle cx="12" cy="15" r="1.8" fill="currentColor"></circle></symbol>
  <symbol id="t-money" viewBox="0 0 24 24"><ellipse cx="12" cy="8" rx="8" ry="3.2" fill="none" stroke="currentColor" stroke-width="2"></ellipse><path d="M4 8v8c0 1.8 3.6 3.2 8 3.2s8-1.4 8-3.2V8" fill="none" stroke="currentColor" stroke-width="2"></path></symbol>
  <symbol id="t-set" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="2"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></symbol>
  <symbol id="t-home" viewBox="0 0 24 24"><path d="M4 11l8-6 8 6M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></symbol>
  <symbol id="t-event" viewBox="0 0 24 24"><rect x="3.5" y="6.5" width="17" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="2"></rect><path d="M3.5 11.4a2 2 0 010 1.2M20.5 11.4a2 2 0 000 1.2M9 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></symbol>
  <!-- stat icons -->
  <symbol id="ic-loc" viewBox="0 0 24 24"><path d="M12 2C8.7 2 6 4.7 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.3-2.7-6-6-6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path><circle cx="12" cy="8" r="2.2" fill="currentColor"></circle></symbol>
  <symbol id="ic-ticket" viewBox="0 0 24 24"><rect x="2.5" y="7" width="19" height="10" rx="3" fill="none" stroke="currentColor" stroke-width="2"></rect><path d="M2.5 12a2 2 0 010 0M21.5 12a2 2 0 000 0M9 7v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></symbol>
  <symbol id="ic-sched" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="2"></rect><path d="M3 9.5h18M8 3v4M16 3v4M7 14h4M7 17.5h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path></symbol>
  <!-- tile icons -->
  <symbol id="ic-graph-s" viewBox="0 0 20 20"><path d="M3 16V4M3 16h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path><polyline points="6 12 9 8 12 10 17 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></polyline></symbol>
  <symbol id="ic-cal-s" viewBox="0 0 20 20"><rect x="2.5" y="4.5" width="15" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M2.5 8.5h15M7 2.5v4M13 2.5v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path></symbol>
  <symbol id="ic-lot-s" viewBox="0 0 20 20"><rect x="6" y="3" width="8" height="14" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"></rect><path d="M9 7.5c.1-1.2 3.2-1.2 3.2.5 0 1.2-1.6 1.2-1.6 2.4M9 14.5v.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"></path></symbol>
</svg>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <!-- status + header -->
    <div class="status">
      <span>22:31</span>
      <span class="r"><span>5G</span><span>100%</span></span>
    </div>
    <div class="hdr">
      <div class="hdr-title">HOME</div>
      <div class="hdr-right">
        <div class="oshi-badge">
          <svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 2l2.7 6.5 7 .6-5.3 4.6 1.7 6.8L12 17l-6.1 3.5 1.7-6.8L2.3 9.1l7-.6z" fill="currentColor"></path></svg>
          推し！
        </div>
        <div style="color:rgba(255,255,255,.72);font-size:18px;line-height:1">⋮</div>
      </div>
    </div>

    <!-- scrollable content -->
    <div class="content">

      <!-- ① カウントダウンヒーロー -->
      <div class="countdown">
        <div class="dot-row">
          <div class="dot"></div>
          <span class="sub">次に会えるまで</span>
        </div>
        <div class="big"><small>あと</small>133日</div>
        <div class="info">
          <div class="pin"></div>
          <span>11月1日(日)・ソウル遠征（海外）</span>
        </div>
      </div>

      <!-- ② クイック統計 3枚 -->
      <div class="stats">
        <div class="stat">
          <div class="tile-ico ico" style="background:var(--pink-soft);color:var(--oshi-pink-deep)">
            <svg width="18" height="18"><use href="#ic-loc"></use></svg>
          </div>
          <div class="num">0</div>
          <div class="lbl">今月の現場</div>
        </div>
        <div class="stat">
          <div class="tile-ico ico" style="background:var(--gold-soft);color:var(--gold-ink)">
            <svg width="18" height="18"><use href="#ic-ticket"></use></svg>
          </div>
          <div class="num">0</div>
          <div class="lbl">当落待ち</div>
        </div>
        <div class="stat">
          <div class="tile-ico ico" style="background:var(--purple-soft);color:var(--purple-deep)">
            <svg width="18" height="18"><use href="#ic-sched"></use></svg>
          </div>
          <div class="num">3</div>
          <div class="lbl">これからの予定</div>
        </div>
      </div>

      <!-- ③ 残高カード -->
      <div class="balance">
        <div class="lab">今月、推しに使えるお金</div>
        <div class="amt">¥50,000</div>
        <div class="gauge"><span id="balGauge" style="width:0%"></span></div>
        <div class="hint">予算 ¥50,000 の 0% を使用</div>
      </div>

      <!-- ④ 2×2 ナビグリッド -->
      <div class="navgrid">
        <div class="navtile">
          <div class="tile-ico" style="background:var(--mint-soft);color:var(--mint-ink)">
            <svg width="18" height="18"><use href="#ic-graph-s"></use></svg>
          </div>
          <div class="tile-ttl">お金の見通し</div>
          <div class="tile-sub">予算・見通し・積立</div>
        </div>
        <div class="navtile">
          <div class="tile-ico" style="background:var(--pink-soft);color:var(--oshi-pink-deep)">
            <svg width="18" height="18"><use href="#ic-cal-s"></use></svg>
          </div>
          <div class="tile-ttl">イベント</div>
          <div class="tile-sub">登録 3件</div>
        </div>
        <div class="navtile">
          <div class="tile-ico" style="background:var(--gold-soft);color:var(--gold-ink)">
            <svg width="18" height="18"><use href="#ic-lot-s"></use></svg>
          </div>
          <div class="tile-ttl">当落</div>
          <div class="tile-sub">待ちなし</div>
        </div>
        <div class="navtile accent">
          <div class="plus-row">
            <div class="plus-circle">＋</div>
            <div class="tile-ttl">行きたいを追加</div>
          </div>
          <div class="tile-sub">イベントを登録する</div>
        </div>
      </div>

      <div class="note-dev">※ これは開発中のイメージです。実際の画面とは異なります。</div>
    </div>

    <!-- tab bar（実アプリと一致：ホーム/カレンダー/イベント/お金/設定） -->
    <div class="tabs">
      <button class="tab active"><span class="ti" style="color:var(--oshi-pink-deep)"><svg width="24" height="24"><use href="#t-home"></use></svg></span><span>ホーム</span></button>
      <button class="tab"><span class="ti" style="color:var(--ink-muted)"><svg width="24" height="24"><use href="#t-cal"></use></svg></span><span>カレンダー</span></button>
      <button class="tab"><span class="ti" style="color:var(--ink-muted)"><svg width="24" height="24"><use href="#t-event"></use></svg></span><span>イベント</span></button>
      <button class="tab"><span class="ti" style="color:var(--ink-muted)"><svg width="24" height="24"><use href="#t-money"></use></svg></span><span>お金</span></button>
      <button class="tab"><span class="ti" style="color:var(--ink-muted)"><svg width="24" height="24"><use href="#t-set"></use></svg></span><span>設定</span></button>
    </div>
  </div>
</div>

</body>
</html>
